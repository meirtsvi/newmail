name: newmail
options:
  bundleIdPrefix: com.meirt
  deploymentTarget:
    macOS: "15.0"
  createIntermediateGroups: true
packages:
  MSAL:
    url: https://github.com/AzureAD/microsoft-authentication-library-for-objc
    from: "2.12.1"
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.6.0"
settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: "WR275ULLHP"
    CODE_SIGN_STYLE: Automatic
targets:
  newmail:
    type: application
    platform: macOS
    deploymentTarget: "15.0"
    sources:
      - path: Sources
      - path: Resources
        buildPhase: resources
    dependencies:
      - package: MSAL
      - package: Sparkle
      - target: ShareExtension
    info:
      path: Config/Info.plist
      properties:
        CFBundleDisplayName: newmail
        LSApplicationCategoryType: public.app-category.productivity
        # Single-instance app: when a mailto: link is opened, LaunchServices routes
        # the URL to the already-running instance instead of launching a second copy.
        LSMultipleInstancesProhibited: true
        NSHumanReadableCopyright: ""
        # Microsoft (MSAL) sign-in redirect scheme. Must match the redirect URI
        # registered in the Azure app: msauth.com.meirt.newmail://auth
        CFBundleURLTypes:
          - CFBundleURLName: com.meirt.newmail
            CFBundleURLSchemes:
              - msauth.com.meirt.newmail
          # Declares the app as a mailto: handler so it shows up in macOS's
          # default-email-reader chooser. `Owner` claims the scheme as a primary
          # mail client (the same rank Mail.app and other clients use).
          - CFBundleURLName: com.meirt.newmail.mailto
            CFBundleURLSchemes:
              - mailto
            LSHandlerRank: Owner
          # Used by the Share extension to wake the app and have it pick up the
          # files it staged in the shared App Group container (newmail://share).
          - CFBundleURLName: com.meirt.newmail.share
            CFBundleURLSchemes:
              - newmail
        LSApplicationQueriesSchemes:
          - msauthv2
          - msauthv3
        # Sparkle auto-updates: the appcast lives in the (public) GitHub repo;
        # release DMGs are attached to GitHub Releases (see Tools/release.sh).
        SUFeedURL: https://raw.githubusercontent.com/meirtsvi/newmail/main/appcast.xml
        # EdDSA public key matching the private key in the login keychain
        # ("Private key for signing Sparkle updates", generated by generate_keys).
        SUPublicEDKey: JlUB5hGBBL2J+Gwi8+ujcggOuhL2RKT0CBk0fdNuKP0=
        # The Release build is sandboxed; Sparkle's installer must run via its
        # XPC launcher service there. (Debug is unsandboxed — the key is inert.)
        SUEnableInstallerLauncherService: true
        # Appear in Finder's "Open With" for images and PDFs; opening one starts a new
        # compose with the file attached. Alternate rank so newmail never becomes the
        # default handler for these types.
        CFBundleDocumentTypes:
          - CFBundleTypeName: Image
            CFBundleTypeRole: Editor
            LSHandlerRank: Alternate
            LSItemContentTypes:
              - public.image
          - CFBundleTypeName: PDF
            CFBundleTypeRole: Editor
            LSHandlerRank: Alternate
            LSItemContentTypes:
              - com.adobe.pdf
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.meirt.newmail
        PRODUCT_NAME: newmail
        CODE_SIGN_ENTITLEMENTS: Config/newmail.entitlements
        ENABLE_HARDENED_RUNTIME: YES
        SWIFT_EMIT_LOC_STRINGS: YES
        COMBINE_HIDPI_IMAGES: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      configs:
        # Debug-only: build the app bundle directly into /Applications so the copy
        # you run from Xcode (⌘R) is the single registered default mail (mailto:)
        # handler — no separate install step. TARGET_BUILD_DIR places the .app there
        # and is what Xcode launches; BUILT_PRODUCTS_DIR is pinned back to the normal
        # DerivedData location so package products (MSAL.framework, .swiftmodule)
        # build there and get embedded — only the .app lands in /Applications.
        Debug:
          TARGET_BUILD_DIR: /Applications
          BUILT_PRODUCTS_DIR: $(SYMROOT)/$(CONFIGURATION)$(EFFECTIVE_PLATFORM_NAME)
          # Debug runs UNSANDBOXED so the app can script Chrome (Apple events) to open
          # calendar reminders. Release stays sandboxed via newmail.entitlements. (Was a
          # manual pbxproj edit; folded in here so regenerating the project preserves it.)
          CODE_SIGN_ENTITLEMENTS: Config/newmail-local.entitlements

  ShareExtension:
    type: app-extension
    platform: macOS
    deploymentTarget: "15.0"
    sources:
      - path: ShareExtension
    info:
      path: ShareExtension/Info.plist
      properties:
        CFBundleDisplayName: newmail
        NSExtension:
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).ShareViewController
          NSExtensionAttributes:
            # Offer newmail in the Share menu only for images and PDFs.
            NSExtensionActivationRule: 'SUBQUERY(extensionItems, $item, SUBQUERY($item.attachments, $att, ANY $att.registeredTypeIdentifiers UTI-CONFORMS-TO "public.image" || ANY $att.registeredTypeIdentifiers UTI-CONFORMS-TO "com.adobe.pdf").@count > 0).@count > 0'
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.meirt.newmail.ShareExtension
        PRODUCT_NAME: ShareExtension
        CODE_SIGN_ENTITLEMENTS: Config/ShareExtension.entitlements
        ENABLE_HARDENED_RUNTIME: YES
        SKIP_INSTALL: YES
