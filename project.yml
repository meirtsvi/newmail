name: newmail
options:
  bundleIdPrefix: com.meirt
  deploymentTarget:
    macOS: "15.0"
  createIntermediateGroups: true
packages:
  MSAL:
    url: https://github.com/AzureAD/microsoft-authentication-library-for-objc
    from: "2.12.1"
settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
targets:
  newmail:
    type: application
    platform: macOS
    deploymentTarget: "15.0"
    sources:
      - path: Sources
      - path: Resources
        buildPhase: resources
    dependencies:
      - package: MSAL
    info:
      path: Config/Info.plist
      properties:
        CFBundleDisplayName: newmail
        LSApplicationCategoryType: public.app-category.productivity
        NSHumanReadableCopyright: ""
        # Microsoft (MSAL) sign-in redirect scheme. Must match the redirect URI
        # registered in the Azure app: msauth.com.meirt.newmail://auth
        CFBundleURLTypes:
          - CFBundleURLName: com.meirt.newmail
            CFBundleURLSchemes:
              - msauth.com.meirt.newmail
        LSApplicationQueriesSchemes:
          - msauthv2
          - msauthv3
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.meirt.newmail
        PRODUCT_NAME: newmail
        CODE_SIGN_ENTITLEMENTS: Config/newmail.entitlements
        ENABLE_HARDENED_RUNTIME: YES
        SWIFT_EMIT_LOC_STRINGS: YES
        COMBINE_HIDPI_IMAGES: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
